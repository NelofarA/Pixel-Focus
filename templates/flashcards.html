{% extends "base.html" %}

{% block title %}Flashcards{% endblock %}

{% block head %}
<link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bitcount+Single+Ink:wght@100..900&family=Doto:wght@100..900&family=DynaPuff:wght@400..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/flashcards2.css') }}">
{% endblock %}

{% block content %}
<h1>Flashcards</h1>

<div class="container">
    <h2>Add Skill Set</h2>
    {% if error %}
        <p style="color:red;">{{ error }}</p>
    {% endif %}

    <form action="{{ url_for('add_skill') }}" method="POST">
        <input type="text" name="skill_name" placeholder="Enter new skill" required>
        <button type="submit" class="button">Add</button>
    </form>
</div>

<br>

<div class="container">
    <h2>My Skill Sets</h2>
    <ul id="skillList">
        {% for skill in skills %}
        <li>
            <a href="{{ url_for('view_skill', skill_id=skill[0]) }}">{{ skill[1] }} </a>
            <form action="{{ url_for('delete_skill', skill_id=skill[0]) }}" method="POST" style="display:inline;">
                <button type="submit" onclick="return confirm('DANGER ZONE: Are you sure you want to delete this skill? This will remove all flashcards and quizzes');">
                    Delete
                </button>
            </form>
        </li>
        {% endfor %}
    </ul>
</div>



{% endblock %}
