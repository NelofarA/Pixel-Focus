<! doctype html>

<html>

<head>
	<title>{% block title %}Pixel Focus{% endblock %}</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Annie+Use+Your+Telescope&family=Bitcount+Single+Ink:wght@100..900&family=Doto:wght@100..900&family=DynaPuff:wght@400..700&display=swap" rel="stylesheet"> 	<link rel="stylesheet" href="{{ url_for('static', filename='css/base2Style.css') }}">

	{% block head %}{% endblock %} <!-- USE THIS FOR ADDITIONAL CSS!!! -->

</head>

<body>
	<h2 class="title">Pixel Focus Login</h2>
	
	<div class="main-content">
		{% with messages = get_flashed_messages() %}
			{% if messages %}
			<ul class=flashes>
				{% for message in messages %}
					<li>{{ message }}</li>
				{% endfor %}
			</ul>
			{% endif %}
		{% endwith %}
		
		{% block content %}
		{% endblock %}
	</div>
		
	
</body>

</html>
